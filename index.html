<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Corridas - Linda</title>
  <style>
    :root {
      --primary: #8A2BE2; 
      --bg: #f4f4f9;
      --text: #333;
      --card: #fff;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 95vh;
    }
    h2 {
      text-align: center;
      color: var(--primary);
    }
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .gasto-extra-box {
      background-color: #fcf4ff;
      border: 1px dashed var(--primary);
      padding: 10px 15px;
      border-radius: 8px;
      margin-top: 15px;
    }
    button {
      width: 100%;
      padding: 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
    }
    button:active {
      background-color: #6a1b9a;
    }
    .history-item {
      background: #eee;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 14px;
      border-left: 5px solid var(--primary);
    }
    .lucro {
      color: green;
      font-weight: bold;
      font-size: 16px;
      display: block;
      margin-top: 8px;
    }
    .extra-text {
      color: #d32f2f;
      font-size: 13px;
    }
    footer {
      margin-top: auto;
      text-align: center;
      padding: 20px 0 10px 0;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Controle Diário</h2>

  <div class="card">
    <form id="registroForm">
      <label>Dia da Semana:</label>
      <input type="text" id="dia" placeholder="Ex: Segunda-feira" required>

      <label>Ganhos 99 (R$):</label>
      <input type="number" step="0.01" id="ganho99" placeholder="0.00" required>

      <label>Ganhos iFood (R$):</label>
      <input type="number" step="0.01" id="ganhoIfood" placeholder="0.00" required>

      <label>Gasto com Gasolina (R$):</label>
      <input type="number" step="0.01" id="gasolina" placeholder="0.00" required>

      <div class="gasto-extra-box">
        <label style="margin-top: 0;">Gasto Extra / Manutenção (Opcional):</label>
        <input type="text" id="descExtra" placeholder="Ex: Lavagem, Óleo, Lanche...">
        
        <label>Valor do Gasto Extra (R$):</label>
        <input type="number" step="0.01" id="valorExtra" placeholder="0.00">
      </div>

      <button type="submit">Salvar Dia</button>
    </form>
  </div>

  <h2>Histórico Salvo</h2>
  <div id="historico" class="card">
    </div>

  <footer>
    <p>Pilote com cuidado, te amo, Linda! ❤️</p>
  </footer>

  <script>
    const form = document.getElementById('registroForm');
    const historicoDiv = document.getElementById('historico');

    document.addEventListener('DOMContentLoaded', renderizarHistorico);

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const dia = document.getElementById('dia').value;
      const ganho99 = parseFloat(document.getElementById('ganho99').value) || 0;
      const ganhoIfood = parseFloat(document.getElementById('ganhoIfood').value) || 0;
      const gasolina = parseFloat(document.getElementById('gasolina').value) || 0;
      
      const descExtra = document.getElementById('descExtra').value || '';
      const valorExtra = parseFloat(document.getElementById('valorExtra').value) || 0;

      // O lucro subtrai a gasolina e qualquer gasto extra registrado
      const lucroDia = (ganho99 + ganhoIfood) - (gasolina + valorExtra);

      const registro = {
        dia, ganho99, ganhoIfood, gasolina, descExtra, valorExtra, lucroDia
      };

      let dados = JSON.parse(localStorage.getItem('dadosLinda')) || [];
      dados.push(registro);
      localStorage.setItem('dadosLinda', JSON.stringify(dados));

      form.reset();
      renderizarHistorico();
      alert('Dados do dia salvos com sucesso!');
    });

    function renderizarHistorico() {
      const dados = JSON.parse(localStorage.getItem('dadosLinda')) || [];
      historicoDiv.innerHTML = '';

      if (dados.length === 0) {
        historicoDiv.innerHTML = '<p style="text-align:center; color:#666;">Nenhum dia registrado ainda.</p>';
        return;
      }

      dados.slice().reverse().forEach(item => {
        let linhaExtra = '';
        if (item.valorExtra > 0) {
          const descricao = item.descExtra ? item.descExtra : 'Outros';
          linhaExtra = `<span class="extra-text">Gasto Extra (${descricao}): - R$ ${item.valorExtra.toFixed(2)}</span><br>`;
        }

        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <strong>${item.dia}</strong><br>
          Faturamento: R$ ${(item.ganho99 + item.ganhoIfood).toFixed(2)} <br>
          Gasolina: - R$ ${item.gasolina.toFixed(2)} <br>
          ${linhaExtra}
          <span class="lucro">Lucro Líquido: R$ ${item.lucroDia.toFixed(2)}</span>
        `;
        historicoDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
