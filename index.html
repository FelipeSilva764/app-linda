<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Corridas - Linda</title>
  <style>
    :root {
      --primary: #8A2BE2; 
      --bg: #f4f4f9;
      --text: #333;
      --card: #fff;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 95vh;
    }
    h2 {
      text-align: center;
      color: var(--primary);
    }
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .gasto-extra-box {
      background-color: #fcf4ff;
      border: 1px dashed var(--primary);
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }
    .linha-extra {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }
    .linha-extra input {
      margin-top: 0;
    }
    .btn-remover {
      background-color: #d32f2f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: auto;
      margin-top: 0;
    }
    .btn-secundario {
      background-color: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      margin-top: 15px;
    }
    button {
      width: 100%;
      padding: 15px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
    }
    button:active {
      background-color: #6a1b9a;
    }
    .history-item {
      background: #eee;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 14px;
      border-left: 5px solid var(--primary);
    }
    .lucro {
      color: green;
      font-weight: bold;
      font-size: 16px;
      display: block;
      margin-top: 8px;
      border-top: 1px solid #ddd;
      padding-top: 8px;
    }
    .extra-text {
      color: #d32f2f;
      font-size: 13px;
      display: block;
      margin-top: 2px;
    }
    footer {
      margin-top: auto;
      text-align: center;
      padding: 20px 0 10px 0;
      color: #777;
      font-size: 14px;
    }
    .mensagem-amor {
      color: var(--primary);
      font-style: italic;
      margin-top: 5px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2>Controle Diário 🏍️</h2>

  <div class="card">
    <form id="registroForm">
      <label>Dia da Semana:</label>
      <input type="text" id="dia" placeholder="Ex: Segunda-feira" required>

      <label>Ganhos 99 (R$):</label>
      <input type="number" step="0.01" id="ganho99" placeholder="0.00" required>

      <label>Ganhos iFood (R$):</label>
      <input type="number" step="0.01" id="ganhoIfood" placeholder="0.00" required>

      <label>Gasto com Gasolina (R$):</label>
      <input type="number" step="0.01" id="gasolina" placeholder="0.00" required>

      <div class="gasto-extra-box">
        <label style="margin-top: 0;">Gastos Extras (Opcional):</label>
        
        <div id="listaExtras"></div>

        <button type="button" id="btnAdicionarExtra" class="btn-secundario">+ Adicionar Gasto Extra</button>
      </div>

      <button type="submit">Salvar Dia</button>
    </form>
  </div>

  <h2>Histórico Salvo</h2>
  <div id="historico" class="card">
    </div>

  <footer>
    <p>Feito para organizar o seu dia a dia.</p>
    <p class="mensagem-amor">Pilote com cuidado, te amo, Linda! ❤️<br>— Do seu amor, Felipe</p>
  </footer>

  <script>
    const form = document.getElementById('registroForm');
    const historicoDiv = document.getElementById('historico');
    const btnAdicionarExtra = document.getElementById('btnAdicionarExtra');
    const listaExtras = document.getElementById('listaExtras');

    // Função para adicionar uma nova linha de gasto extra
    btnAdicionarExtra.addEventListener('click', () => {
      const div = document.createElement('div');
      div.className = 'linha-extra';
      div.innerHTML = `
        <input type="text" class="desc-extra" placeholder="O que foi?">
        <input type="number" step="0.01" class="valor-extra" placeholder="R$ 0.00">
        <button type="button" class="btn-remover" onclick="this.parentElement.remove()">X</button>
      `;
      listaExtras.appendChild(div);
    });

    document.addEventListener('DOMContentLoaded', renderizarHistorico);

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const dia = document.getElementById('dia').value;
      const ganho99 = parseFloat(document.getElementById('ganho99').value) || 0;
      const ganhoIfood = parseFloat(document.getElementById('ganhoIfood').value) || 0;
      const gasolina = parseFloat(document.getElementById('gasolina').value) || 0;
      
      // Coletar todos os gastos extras adicionados
      let gastosExtrasArray = [];
      let totalExtras = 0;
      
      const linhasDeGasto = document.querySelectorAll('.linha-extra');
      linhasDeGasto.forEach(linha => {
        const desc = linha.querySelector('.desc-extra').value || 'Outros';
        const valor = parseFloat(linha.querySelector('.valor-extra').value) || 0;
        
        if (valor > 0) {
          gastosExtrasArray.push({ descricao: desc, valor: valor });
          totalExtras += valor;
        }
      });

      // O lucro subtrai a gasolina e a soma de todos os gastos extras
      const lucroDia = (ganho99 + ganhoIfood) - (gasolina + totalExtras);

      const registro = {
        dia, 
        ganho99, 
        ganhoIfood, 
        gasolina, 
        gastosExtras: gastosExtrasArray, 
        lucroDia
      };

      let dados = JSON.parse(localStorage.getItem('dadosLinda')) || [];
      dados.push(registro);
      localStorage.setItem('dadosLinda', JSON.stringify(dados));

      form.reset();
      listaExtras.innerHTML = ''; // Limpa as linhas extras após salvar
      renderizarHistorico();
      alert('Dados do dia salvos com sucesso!');
    });

    function renderizarHistorico() {
      const dados = JSON.parse(localStorage.getItem('dadosLinda')) || [];
      historicoDiv.innerHTML = '';

      if (dados.length === 0) {
        historicoDiv.innerHTML = '<p style="text-align:center; color:#666;">Nenhum dia registrado ainda.</p>';
        return;
      }

      dados.slice().reverse().forEach(item => {
        let blocoExtras = '';
        
        // Verifica se existem gastos extras na nova estrutura (array)
        if (item.gastosExtras && item.gastosExtras.length > 0) {
          item.gastosExtras.forEach(extra => {
            blocoExtras += `<span class="extra-text">Gasto Extra (${extra.descricao}): - R$ ${extra.valor.toFixed(2)}</span>`;
          });
        } 
        // Mantém a compatibilidade caso exista algum dado salvo no formato antigo
        else if (item.valorExtra > 0) {
          const desc = item.descExtra ? item.descExtra : 'Outros';
          blocoExtras = `<span class="extra-text">Gasto Extra (${desc}): - R$ ${item.valorExtra.toFixed(2)}</span>`;
        }

        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <strong>${item.dia}</strong><br>
          Faturamento: R$ ${(item.ganho99 + item.ganhoIfood).toFixed(2)} <br>
          Gasolina: - R$ ${item.gasolina.toFixed(2)} <br>
          ${blocoExtras}
          <span class="lucro">Lucro Líquido: R$ ${item.lucroDia.toFixed(2)}</span>
        `;
        historicoDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
